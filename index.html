<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나윤 & 채윤</title>
  <meta name="description" content="나윤과 채윤의 일상 링크 모음" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255, 198, 213, .75), transparent 28%),
        radial-gradient(circle at 82% 20%, rgba(177, 221, 255, .8), transparent 30%),
        radial-gradient(circle at 50% 88%, rgba(255, 231, 166, .7), transparent 28%),
        linear-gradient(135deg, #fffaf4 0%, #f7f0ff 48%, #eff8ff 100%);
      font-family: 'Gowun Dodum', sans-serif;
      color: #242424;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: 720px;
      position: relative;
      padding: 34px 24px 28px;
      border-radius: 42px;
      background: rgba(255, 255, 255, .58);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow:
        0 30px 80px rgba(82, 79, 122, .18),
        inset 0 0 0 1px rgba(255,255,255,.65);
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(255,255,255,.9);
      border-radius: 34px;
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(1px);
      opacity: .9;
    }

    .orb.one {
      width: 150px;
      height: 150px;
      background: #ffd1df;
      top: -40px;
      left: -46px;
    }

    .orb.two {
      width: 180px;
      height: 180px;
      background: #c8e8ff;
      right: -70px;
      top: 90px;
    }

    .orb.three {
      width: 130px;
      height: 130px;
      background: #ffe9a8;
      left: 35px;
      bottom: -42px;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .mark {
      width: 96px;
      height: 96px;
      margin: 18px auto 24px;
      border-radius: 32px;
      background: linear-gradient(135deg, #ffffff, #fff3f8);
      display: grid;
      place-items: center;
      font-size: 42px;
      box-shadow:
        0 18px 35px rgba(255, 118, 163, .22),
        inset 0 0 0 1px rgba(255,255,255,.9);
      transform: rotate(-4deg);
    }

    h1 {
      font-family: 'Nanum Myeongjo', serif;
      font-size: 36px;
      line-height: 1.2;
      letter-spacing: -1.2px;
      margin-bottom: 12px;
      color: #202020;
    }

    .subtitle {
      font-size: 15px;
      color: #6f6f6f;
      line-height: 1.7;
      margin-bottom: 34px;
    }

    .links {
      display: grid;
      gap: 16px;
      margin-top: 4px;
    }

    .card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      text-align: left;
      padding: 18px;
      border-radius: 28px;
      background: rgba(255,255,255,.78);
      border: 1.5px solid rgba(255,255,255,.95);
      box-shadow: 0 14px 34px rgba(86, 88, 120, .11);
      color: #222;
      overflow: hidden;
      transition: transform .25s ease, box-shadow .25s ease;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.015);
      box-shadow: 0 20px 44px rgba(86, 88, 120, .18);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px;
      padding: 2px;
      background: linear-gradient(135deg, #ff8eb8, #ffe6a8, #88d9ff);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: .9;
      pointer-events: none;
    }

    .icon {
      width: 58px;
      height: 58px;
      flex: 0 0 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 27px;
      background: linear-gradient(135deg, #fff3f8, #ffffff);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.9);
    }

    .card:nth-child(2) .icon {
      background: linear-gradient(135deg, #eff9ff, #ffffff);
    }

    .text strong {
      display: block;
      font-size: 18px;
      margin-bottom: 5px;
      letter-spacing: -0.3px;
    }

    .text span {
      font-size: 13px;
      color: #777;
    }

    .arrow {
      margin-left: auto;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #242424;
      color: #fff;
      font-size: 18px;
    }

    .note {
      margin-top: 34px;
      font-size: 12px;
      color: #888;
      letter-spacing: .08em;
    }

    @media (max-width: 460px) {
      body {
        padding: 14px;
      }

      .phone {
        min-height: 680px;
        padding: 28px 18px 24px;
        border-radius: 34px;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>
  <main class="phone">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>

    <section class="content">
      <div class="mark">✦</div>

      <h1>나윤 & 채윤</h1>
      <p class="subtitle">
        오늘의 작은 순간들이<br>
        오래도록 반짝이는 기록이 되도록
      </p>

      <div class="links">
        <a class="card" href="https://www.instagram.com/t.daynana" target="_blank" rel="noopener">
          <div class="icon">🌷</div>
          <div class="text">
            <strong>나윤's 일상</strong>
            <span>따뜻한 순간을 담은 공간</span>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="card" href="https://www.instagram.com/t.daychae" target="_blank" rel="noopener">
          <div class="icon">🫧</div>
          <div class="text">
            <strong>채윤's 일상</strong>
            <span>반짝이는 하루를 담은 공간</span>
          </div>
          <div class="arrow">›</div>
        </a>
      </div>

      <div class="note">LITTLE MOMENT ARCHIVE</div>
    </section>
  </main>
</body>
</html>
