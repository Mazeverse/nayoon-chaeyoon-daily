<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>나윤 & 채윤</title>
  <meta name="description" content="나윤과 채윤의 인스타그램 링크 모음" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Pretendard:wght@400;600;700;800&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e9e6df;
      font-family: 'Pretendard', sans-serif;
      color: #161616;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 390px;
      min-height: 660px;
      background: #fbf5e8;
      padding: 58px 34px 36px;
      text-align: center;
      box-shadow: 0 24px 70px rgba(0,0,0,0.12);
      border: 1px solid rgba(0,0,0,0.08);
    }

    .label {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
    }

    h1 {
      font-family: 'Archivo Black', 'Pretendard', sans-serif;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -1.4px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 13px;
      color: #555;
      margin-bottom: 42px;
    }

    .links {
      display: grid;
      gap: 13px;
      margin-bottom: 32px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 47px;
      border: 1.7px solid #171717;
      border-radius: 999px;
      background: #eee6d7;
      color: #171717;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: 0.2s ease;
    }

    .link:hover {
      background: #171717;
      color: #fbf5e8;
      transform: translateY(-2px);
    }

    .text {
      max-width: 260px;
      margin: 0 auto;
      font-size: 11px;
      line-height: 1.55;
      color: #575757;
    }

    .footer {
      margin-top: 42px;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #777;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        background: #fbf5e8;
      }

      .page {
        min-height: 100vh;
        max-width: none;
        box-shadow: none;
        border: none;
        padding-top: 72px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="label">@MOMENT ARCHIVE</div>

    <h1>나윤<br>& 채윤</h1>

    <p class="subtitle">반짝이는 하루를 기록하는 작은 공간</p>

    <section class="links">
      <a class="link" href="https://www.instagram.com/t.daynana" target="_blank" rel="noopener">
        나윤's 일상
      </a>

      <a class="link" href="https://www.instagram.com/t.daychae" target="_blank" rel="noopener">
        채윤's 일상
      </a>
    </section>

    <p class="text">
      소중한 순간들을 천천히 모아두는 곳.<br>
      오늘의 작은 기억이 오래 남는 장면이 되기를.
    </p>

    <div class="footer">© 2026 LITTLE DAYS</div>
  </main>
</body>
</html>
