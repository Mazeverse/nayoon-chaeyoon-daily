<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>나윤 & 채윤</title>
<meta name="description" content="나윤과 채윤의 일상 링크" />

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Pretendard', sans-serif;
}

body {
  background: linear-gradient(180deg, #f5f1e9 0%, #eae4d8 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

/* 컨테이너 */
.container {
  width: 100%;
  max-width: 420px;
  text-align: center;
}

/* 상단 */
.title {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 8px;
}

.subtitle {
  font-size: 14px;
  color: #666;
  margin-bottom: 40px;
}

/* 카드 영역 */
.card {
  background: #ffffff;
  border-radius: 22px;
  padding: 24px 20px;
  margin-bottom: 14px;
  border: 1px solid #ddd;
  box-shadow: 0 8px 20px rgba(0,0,0,0.06);
  transition: 0.25s;
  text-decoration: none;
  display: block;
  color: #111;
  position: relative;
}

/* hover 효과 */
.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 16px 35px rgba(0,0,0,0.12);
}

/* 좌측 컬러 라인 */
.card::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 6px;
  border-radius: 22px 0 0 22px;
}

/* 나윤 */
.nayeon::before {
  background: #ff6b9a;
}

/* 채윤 */
.chaeyun::before {
  background: #4da6ff;
}

/* 제목 */
.card-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 6px;
}

/* 설명 */
.card-desc {
  font-size: 13px;
  color: #777;
}

/* 인스타 텍스트 */
.card small {
  display: block;
  margin-top: 10px;
  font-size: 11px;
  color: #aaa;
}

/* 푸터 */
.footer {
  margin-top: 30px;
  font-size: 12px;
  color: #999;
}

@media (max-width: 480px) {
  body {
    align-items: flex-start;
    padding-top: 60px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">나윤 & 채윤</div>
  <div class="subtitle">작고 반짝이는 일상 기록</div>

  <!-- 나윤 -->
  <a href="https://www.instagram.com/t.daynana" target="_blank" class="card nayeon">
    <div class="card-title">나윤's 일상</div>
    <div class="card-desc">따뜻하고 소중한 하루</div>
    <small>Instagram 바로가기</small>
  </a>

  <!-- 채윤 -->
  <a href="https://www.instagram.com/t.daychae" target="_blank" class="card chaeyun">
    <div class="card-title">채윤's 일상</div>
    <div class="card-desc">반짝반짝 빛나는 순간</div>
    <small>Instagram 바로가기</small>
  </a>

  <div class="footer">© 2026 Moment Archive</div>

</div>

</body>
</html>
