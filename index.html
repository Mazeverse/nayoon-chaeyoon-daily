<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나윤 & 채윤 일상</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9f7f2; /* 이미지 특유의 아이보리 배경 */
            --text-black: #1a1a1a;
            --nana-pastel: #f2d5d5; /* 나윤 - 톤다운 파스텔 핑크 */
            --chae-pastel: #d5e2f2; /* 채윤 - 톤다운 파스텔 블루 */
            --accent-peach: #ffbd9b; /* 이미지의 COACH 배지 색상 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            color: var(--text-black);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 60px 24px;
            text-align: center;
        }

        /* 이미지의 아치형 프로필 스타일 */
        .profile-section {
            position: relative;
            width: 240px;
            height: 280px;
            margin: 0 auto 40px;
        }

        .profile-arch {
            width: 100%;
            height: 100%;
            background: #e0e0e0; /* 사진 넣기 전 기본 배경 */
            border-radius: 120px 120px 40px 40px; /* 상단은 둥글고 하단은 완만한 아치 */
            overflow: hidden;
            border: 1.5px solid var(--text-black);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        /* 이미지의 'COACH' 배지 스타일 */
        .badge {
            position: absolute;
            bottom: 20px;
            right: -20px;
            background-color: var(--accent-peach);
            padding: 12px 24px;
            border-radius: 40px;
            border: 1.5px solid var(--text-black);
            font-family: 'Archivo Black', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0px var(--text-black);
        }

        .handle {
            font-size: 13px;
            letter-spacing: 2px;
            margin-bottom: 10px;
            font-weight: 500;
            opacity: 0.8;
        }

        h1 {
            font-family: 'Archivo Black', 'Noto Sans KR', sans-serif;
            font-size: 36px;
            margin: 0 0 40px 0;
            letter-spacing: -1px;
            font-weight: 900;
        }

        .links-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 이미지의 알약 모양 버튼 스타일 */
        .link-card {
            display: block;
            padding: 20px;
            border-radius: 50px; /* 완전한 알약 모양 */
            border: 1.5px solid var(--text-black);
            text-decoration: none;
            color: var(--text-black);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .link-nana { background-color: var(--nana-pastel); }
        .link-chae { background-color: var(--chae-pastel); }

        .link-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 0px var(--text-black);
        }

        .link-card:active {
            transform: translateY(0px);
            box-shadow: 0 0px 0px var(--text-black);
        }

        .description {
            margin-top: 40px;
            font-size: 14px;
            line-height: 1.6;
            color: #666;
            padding: 0 20px;
        }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-arch">
                <!-- 나중에 사진을 넣으려면 <img src="사진주소" style="width:100%; height:100%; object-fit:cover;"> 로 교체하세요 -->
                📸
            </div>
            <div class="badge">DAILY</div>
        </div>

        <div class="handle">@NAYUN_CHAEYUN</div>
        <h1>나윤 & 채윤</h1>

        <div class="links-group">
            <a href="https://www.instagram.com/t.daynana" target="_blank" class="link-card link-nana">
                나윤's 일상 보러가기
            </a>
            <a href="https://www.instagram.com/t.daychae" target="_blank" class="link-card link-chae">
                채윤's 일상 보러가기
            </a>
        </div>

        <p class="description">
            사랑스러운 두 아이의 반짝이는 순간들을 기록합니다.<br>
            오늘도 행복한 하루 되세요!
        </p>

        <div class="footer">
            © 2026 MOMENT ARCHIVE
        </div>
    </div>
</body>
</html>
