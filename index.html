<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>나윤 & 채윤 | Moment Link</title>
  <meta name="description" content="나윤과 채윤의 인스타그램 링크 모음" />

  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 181, 206, 0.85), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(151, 208, 255, 0.85), transparent 30%),
        radial-gradient(circle at 55% 88%, rgba(255, 224, 137, 0.8), transparent 30%),
        linear-gradient(135deg, #fff8ee 0%, #f7edff 48%, #eef8ff 100%);
      font-family: 'Gowun Dodum', sans-serif;
      color: #191919;
    }

    .wrap {
      width: 100%;
      max-width: 430px;
      min-height: 720px;
      position: relative;
      overflow: hidden;
      border-radius: 42px;
      padding: 34px 24px;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow:
        0 35px 90px rgba(70, 60, 120, 0.22),
        inset 0 0 0 1px rgba(255,255,255,0.7);
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 32px;
      border: 1px solid rgba(255,255,255,0.75);
      pointer-events: none;
    }

    .shine {
      position: absolute;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      filter: blur(35px);
      top: -120px;
      right: -100px;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .mini-label {
      display: inline-block;
      margin-top: 18px;
      margin-bottom: 22px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,0.68);
      border: 1px solid rgba(255,255,255,0.9);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: #777;
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 46px;
      line-height: 1.02;
      letter-spacing: -1.6px;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.75;
      color: #666;
      margin-bottom: 38px;
    }

    .links {
      display: grid;
      gap: 16px;
    }

    .link-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 15px;
      text-decoration: none;
      color: #191919;
      padding: 17px 18px;
      border-radius: 26px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.92);
      box-shadow:
        0 16px 36px rgba(60, 55, 100, 0.12),
        inset 0 0 0 1px rgba(255,255,255,0.65);
      overflow: hidden;
      transition: 0.25s ease;
    }

    .link-card:hover {
      transform: translateY(-5px) scale(1.015);
      box-shadow:
        0 22px 48px rgba(60, 55, 100, 0.18),
        inset 0 0 0 1px rgba(255,255,255,0.85);
    }

    .link-card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: 0.25s ease;
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .nayeon::before {
      background: linear-gradient(135deg, rgba(255,130,177,0.2), transparent);
    }

    .chaeyun::before {
      background: linear-gradient(135deg, rgba(99,190,255,0.22), transparent);
    }

    .icon {
      width: 56px;
      height: 56px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      font-size: 25px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(0,0,0,0.07);
      flex: 0 0 56px;
      position: relative;
      z-index: 1;
    }

    .text {
      text-align: left;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .text strong {
      display: block;
      font-size: 17px;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .text span {
      font-size: 12.5px;
      color: #777;
    }

    .arrow {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #191919;
      color: #fff;
      font-size: 20px;
      position: relative;
      z-index: 1;
    }

    .message {
      margin-top: 34px;
      padding: 20px 18px;
      border-radius: 28px;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(255,255,255,0.75);
      font-size: 13px;
      line-height: 1.7;
      color: #666;
    }

    .footer {
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: #8a8a8a;
    }

    .dot {
      position: absolute;
      border-radius: 999px;
      opacity: 0.85;
    }

    .d1 {
      width: 12px;
      height: 12px;
      background: #ff8fba;
      left: 35px;
      top: 130px;
    }

    .d2 {
      width: 9px;
      height: 9px;
      background: #72caff;
      right: 42px;
      top: 250px;
    }

    .d3 {
      width: 14px;
      height: 14px;
      background: #ffd866;
      left: 56px;
      bottom: 145px;
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .wrap {
        min-height: calc(100vh - 24px);
        border-radius: 34px;
        padding: 30px 20px;
      }

      h1 {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="shine"></div>
    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>

    <section class="content">
      <div class="mini-label">LITTLE MOMENT ARCHIVE</div>

      <h1>NaYoon<br>& ChaeYoon</h1>

      <p class="subtitle">
        작고 소중한 하루들이<br>
        오래도록 반짝이는 공간
      </p>

      <div class="links">
        <a class="link-card nayeon" href="https://www.instagram.com/t.daynana" target="_blank" rel="noopener">
          <div class="icon">🌷</div>
          <div class="text">
            <strong>나윤's 일상</strong>
            <span>따뜻한 순간을 담은 인스타그램</span>
          </div>
          <div class="arrow">›</div>
        </a>

        <a class="link-card chaeyun" href="https://www.instagram.com/t.daychae" target="_blank" rel="noopener">
          <div class="icon">🫧</div>
          <div class="text">
            <strong>채윤's 일상</strong>
            <span>반짝이는 하루를 담은 인스타그램</span>
          </div>
          <div class="arrow">›</div>
        </a>
      </div>

      <div class="message">
        오늘의 작은 기록들이<br>
        언젠가 가장 예쁜 추억이 되기를.
      </div>

      <div class="footer">© 2026 MOMENT LINK</div>
    </section>
  </main>
</body>
</html>
