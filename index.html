<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나윤 & 채윤's Daily</title>
    <!-- 귀여운 폰트 적용 -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF9FB;
            --card-bg: #FFFFFF;
            --text-main: #5D5D5D;
            --point-pink: #FFB6C1;
            --point-yellow: #FFFACD;
            --accent: #FF85A1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Gaegu', cursive;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }

        .wrapper {
            width: 100%;
            max-width: 430px;
            padding: 60px 20px;
            text-align: center;
        }

        .profile-section {
            margin-bottom: 40px;
        }

        .profile-emoji {
            font-size: 50px;
            background: white;
            width: 100px;
            height: 100px;
            line-height: 100px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(255, 182, 193, 0.3);
            margin-bottom: 20px;
            border: 4px solid var(--point-pink);
        }

        h1 { font-size: 32px; margin: 10px 0; color: var(--accent); }
        p { font-size: 20px; margin-bottom: 30px; opacity: 0.8; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .link-item:hover {
            transform: scale(1.03);
            border-color: var(--point-pink);
            background-color: var(--point-yellow);
        }

        .footer {
            margin-top: 60px;
            font-size: 16px;
            opacity: 0.5;
        }

        /* 반짝이는 애니메이션 */
        @keyframes sparkle {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .sparkle { animation: sparkle 1.5s infinite; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="profile-section">
            <div class="profile-emoji">🎀</div>
            <h1>나윤 & 채윤이의 일상</h1>
            <p>반짝반짝 빛나는 아이들의 하루 <span class="sparkle">✨</span></p>
        </div>

        <div class="links-container">
            <a href="https://www.instagram.com/t.daynana" target="_blank" class="link-item">
                🌸 나윤's 일상 보러가기
            </a>
            <a href="https://www.instagram.com/t.daychae" target="_blank" class="link-item">
                🐥 채윤's 일상 보러가기
            </a>
        </div>

        <div class="footer">
            © 2026 Nayun & Chaeyun. All rights reserved.
        </div>
    </div>
</body>
</html>
