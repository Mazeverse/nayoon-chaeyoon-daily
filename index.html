<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나윤 & 채윤 | 링크</title>

  <meta name="description" content="나윤과 채윤의 반짝이는 일상, 인스타그램 바로가기" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      background: #FFF8F0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      padding: 20px;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }

    .card {
      display: block;
      text-decoration: none;
      padding: 20px;
      border-radius: 18px;
      margin-bottom: 16px;
      background: #fff;
      transition: 0.25s;
      box-shadow: 0 6px 16px rgba(0,0,0,0.05);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.1);
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: #666;
    }

    /* 나윤 카드 */
    .nayon {
      border: 3px solid #FF5FA2;
    }

    .nayon .card-title {
      color: #FF2E88;
    }

    /* 채윤 카드 */
    .chaeyun {
      border: 3px solid #4DB8FF;
    }

    .chaeyun .card-title {
      color: #1A9BFF;
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      color: #aaa;
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="logo">🌸 나윤 & 채윤</div>
    <div class="subtitle">반짝이는 우리의 일상</div>

    <!-- 나윤 -->
    <a href="https://www.instagram.com/t.daynana" target="_blank" class="card nayon">
      <div class="card-title">나윤's 일상</div>
      <div class="card-desc">따뜻하고 소중한 기록들</div>
    </a>

    <!-- 채윤 -->
    <a href="https://www.instagram.com/t.daychae" target="_blank" class="card chaeyun">
      <div class="card-title">채윤's 일상</div>
      <div class="card-desc">반짝반짝 빛나는 하루</div>
    </a>

    <footer>© 2026 Moment Archive</footer>
  </div>

</body>
</html>
