<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나윤 & 채윤 일상</title>
    <!-- 동글동글함의 끝판왕 '나눔스퀘어라운드' 및 '가구' 폰트 사용 -->
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 폰트 정의: 나눔스퀘어라운드 웹폰트가 없을 경우를 대비해 둥근 서체 위주 설정 */
        @import url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumSquareRound.css');

        :root {
            --bg-color: #ffffff; /* 깨끗한 화이트 배경 */
            --text-main: #333333;
            --text-sub: #999999;
            --nana-color: #fff0f3; /* 아주 연한 핑크 */
            --chae-color: #f0f7ff; /* 아주 연한 블루 */
            --border-soft: #eeeeee;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            word-break: keep-all;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'NanumSquareRound', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 380px;
            padding: 40px 28px;
            text-align: center;
        }

        /* 상단 심플 아이콘 */
        .header-icon {
            font-size: 32px;
            margin-bottom: 15px;
            display: block;
            opacity: 0.8;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        .sub-title {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 45px;
            font-weight: 400;
        }

        .links-wrap {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* 동글동글 심플 카드 스타일 */
        .link-item {
            display: block;
            padding: 22px;
            border-radius: 30px; /* 둥근 모서리 */
            text-decoration: none;
            color: var(--text-main);
            font-size: 17px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .link-nana {
            background-color: var(--nana-color);
        }

        .link-chae {
            background-color: var(--chae-color);
        }

        /* 마우스 올렸을 때 부드러운 반응 */
        .link-item:hover {
            transform: scale(1.02);
            filter: brightness(0.98);
        }

        .link-item span {
            display: block;
            font-size: 12px;
            font-weight: 400;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .footer {
            margin-top: 60px;
            font-size: 12px;
            color: #ccc;
            letter-spacing: 1px;
        }

        /* 심플한 하단 장식 */
        .dot-deco {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: var(--border-soft);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="header-icon">☁️</span>
        <h1>나윤 & 채윤</h1>
        <p class="sub-title">소소하고 소중한 일상 기록</p>

        <div class="links-wrap">
            <a href="https://www.instagram.com/t.daynana" target="_blank" class="link-item link-nana">
                나윤's 일상
                <span>@t.daynana</span>
            </a>
            <a href="https://www.instagram.com/t.daychae" target="_blank" class="link-item link-chae">
                채윤's 일상
                <span>@t.daychae</span>
            </a>
        </div>

        <div class="dot-deco">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="footer">
            © 2026 MOMENT ARCHIVE
        </div>
    </div>
</body>
</html>
